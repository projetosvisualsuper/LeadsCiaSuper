name = "gerency-leads"
compatibility_date = "2024-05-02"
compatibility_flags = ["nodejs_compat"]

# Variáveis globais do Cloudflare Pages
[vars]
DB_PROVIDER = "d1"

[[d1_databases]]
binding = "DB"
database_name = "gerency-leads-db"
database_id = "your-d1-database-id-here" # Substitua com o ID do banco gerado pelo comando wrangler d1 create
